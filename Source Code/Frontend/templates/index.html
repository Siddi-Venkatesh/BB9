<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourBank - Secure Auth</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a; color: white; min-height: 100vh;
            position: relative; overflow-x: hidden;
        }
        /* Background decorative elements */
        .bg-decoration {
            position: absolute; top: 0; right: 0; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(185, 255, 0, 0.1) 0%, transparent 70%);
            border-radius: 50%; z-index: 0;
        }
        .bg-dots {
            position: absolute; top: 100px; right: 50px; width: 200px; height: 200px;
            background-image: radial-gradient(circle, rgba(185, 255, 0, 0.3) 2px, transparent 2px);
            background-size: 20px 20px; z-index: 0;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px; position: relative; z-index: 10;
        }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; }
        .logo-icon {
            width: 32px; height: 32px; background: #b9ff00; border-radius: 6px;
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .logo-icon::before { content: ''; width: 12px; height: 12px; background: #1a1a1a; border-radius: 2px; position: absolute; top: 6px; left: 6px; }
        .logo-icon::after { content: ''; width: 8px; height: 8px; background: #1a1a1a; border-radius: 2px; position: absolute; bottom: 6px; right: 6px; }
        .nav { display: flex; gap: 30px; }
        .nav a { color: #9ca3af; text-decoration: none; font-weight: 500; transition: color 0.3s ease; }
        .nav a:hover { color: white; }
        .header-buttons { display: flex; gap: 15px; align-items: center; }
        .login-btn { background: #b9ff00; color: #1a1a1a; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: 600; transition: all 0.3s ease; }
        .main-content { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 100px); padding: 40px; position: relative; z-index: 5; }
        .signup-title { font-size: 64px; font-weight: 700; color: #b9ff00; margin-bottom: 20px; text-align: center; }
        .signup-subtitle { font-size: 16px; color: #9ca3af; text-align: center; margin-bottom: 50px; max-width: 500px; line-height: 1.6; }
        .form-container { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 40px; width: 100%; max-width: 480px; animation: float 8s ease-in-out infinite; }
        .form-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .form-group { flex: 1; }
        .form-group.full-width { width: 100%; margin-bottom: 20px; }
        .form-input { width: 100%; padding: 16px 20px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; color: white; font-size: 16px; transition: all 0.3s ease; }
        .form-input:focus { outline: none; border-color: #b9ff00; background: rgba(255, 255, 255, 0.08); box-shadow: 0 0 0 3px rgba(185, 255, 0, 0.1); }
        .password-group { position: relative; }
        .password-toggle { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #6b7280; font-size: 18px; }
        .primary-btn { width: 100%; background: #b9ff00; color: #1a1a1a; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-bottom: 20px; }
        .secondary-btn { width: 100%; background: transparent; color: white; padding: 16px; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; margin-bottom: 30px; }
        .divider { display: flex; align-items: center; margin: 30px 0; color: #6b7280; font-size: 14px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255, 255, 255, 0.2); }
        .divider span { padding: 0 20px; }
        .social-buttons { display: flex; justify-content: center; gap: 20px; }
        .social-btn { width: 60px; height: 60px; border-radius: 50%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; }
        .forgot-password { text-align: right; margin-bottom: 20px; }
        .forgot-password a { color: #b9ff00; text-decoration: none; font-size: 14px; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>
    <div class="bg-dots"></div>

    <header class="header">
        <div class="logo"><div class="logo-icon"></div>YourBank</div>
        <nav class="nav"><a href="#">Home</a><a href="#">Careers</a><a href="#">About</a><a href="#">Security</a></nav>
        <div class="header-buttons">
            <a href="javascript:void(0)" class="sign-up-btn" onclick="showSignup()" style="color: white; text-decoration: none; margin-right: 15px;">Sign Up</a>
            <a href="javascript:void(0)" class="login-btn" onclick="showLogin()">Login</a>
        </div>
    </header>

    <main class="main-content">
        <h1 class="signup-title" id="pageTitle">Sign Up</h1>
        <p class="signup-subtitle" id="pageSubtitle">Join our community today! Create an account for a personalized experience.</p>

        <div class="form-container">
            <form id="signupForm" onsubmit="handleSignup(event)" autocomplete="off">
                <div class="form-row">
                    <div class="form-group"><input type="text" id="regFirstName" class="form-input" placeholder="First Name" required autocomplete="new-password"></div>
                    <div class="form-group"><input type="text" id="regLastName" class="form-input" placeholder="Last Name" required autocomplete="new-password"></div>
                </div>
                <div class="form-group full-width"><input type="email" id="regEmail" class="form-input" placeholder="Email" required autocomplete="new-password"></div>
                <div class="form-group full-width password-group">
                    <input type="password" id="regPassword" class="form-input" placeholder="Password" required autocomplete="new-password">
                    <span class="password-toggle" onclick="togglePassword('regPassword')">👁</span>
                </div>
                <button type="submit" class="primary-btn">Sign Up</button>
                <button type="button" class="secondary-btn" onclick="showLogin()">Go to Login</button>
            </form>

            <form id="loginForm" style="display: none;" onsubmit="handleLogin(event)" autocomplete="off">
                <div class="form-group full-width">
                    <input type="text" id="loginEmail" class="form-input" placeholder="Email" required autocomplete="new-password">
                </div>
                <div class="form-group full-width password-group">
                    <input type="text" id="loginPassword" class="form-input" placeholder="Password" required autocomplete="new-password" oninput="this.type='password'">
                    <span class="password-toggle" onclick="togglePassword('loginPassword')">👁</span>
                </div>
                <div class="forgot-password"><a href="javascript:void(0)" onclick="forgotPassword()">Forgot Password?</a></div>
                <button type="submit" class="primary-btn">Login</button>
                <button type="button" class="secondary-btn" onclick="showSignup()">Create Account</button>
            </form>

            <div class="divider"><span>Or Continue with</span></div>
            <div class="social-buttons">
                <button class="social-btn" style="color:#4285f4">G</button>
                <button class="social-btn" style="color:#1877f2">f</button>
                <button class="social-btn" style="color:white">🍎</button>
            </div>
        </div>
    </main>

    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = (input.type === 'password' || input.className.includes('pass-active')) ? 'text' : 'password';
        }

        function showLogin() {
            // Completely empty the fields and clear DOM state
            document.getElementById('signupForm').reset();
            const logForm = document.getElementById('loginForm');
            logForm.reset();
            
            const emailInp = document.getElementById('loginEmail');
            const passInp = document.getElementById('loginPassword');
            
            emailInp.value = "";
            passInp.value = "";
            passInp.type = "text"; // Reset type to text to prevent autofill detection

            document.getElementById('signupForm').style.display = 'none';
            logForm.style.display = 'block';
            document.getElementById('pageTitle').textContent = 'Login';
            document.getElementById('pageSubtitle').textContent = 'Welcome back! Please sign in to your account.';
        }

        function showSignup() {
            document.getElementById('loginForm').reset();
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
            document.getElementById('pageTitle').textContent = 'Sign Up';
            document.getElementById('pageSubtitle').textContent = 'Join our community today! Create an account for a personalized experience.';
        }

        function handleSignup(e) {
            e.preventDefault();
            const user = {
                firstName: document.getElementById('regFirstName').value,
                lastName: document.getElementById('regLastName').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value
            };
            localStorage.setItem("user", JSON.stringify(user));
            alert(`Account created for ${user.firstName}! 🎉`);
            showLogin();
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const savedUser = JSON.parse(localStorage.getItem("user"));

            if (savedUser && savedUser.email === email && savedUser.password === password) {
                alert(`Welcome back, ${savedUser.firstName}! 🎉`);
                window.location.href = "/home"; 
            } else {
                alert("Invalid email or password ❌");
            }
        }

        function forgotPassword() {
            const email = prompt("Enter email:");
            const savedUser = JSON.parse(localStorage.getItem("user"));
            if (savedUser && savedUser.email === email) alert("Link sent! Check your inbox.");
            else alert("User not found.");
        }
    </script>
</body>
</html>
